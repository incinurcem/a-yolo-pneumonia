# Generator, discriminator, patch size, channels
#s
model:
  generator:
    name: "unet_generator"
    in_channels: 1
    out_channels: 1
    features: [64, 128, 256, 512]
    bottleneck_channels: 1024
    use_dropout: true
    dropout: 0.50
    final_activation: "tanh"

  discriminator:
    name: "patchgan"
    in_channels: 2
    features: [64, 128, 256, 512]
    use_spectral_norm: false
    use_instance_norm: true

reconstruction:
  normalize_input_to_minus1_1: true
  denormalize_output: true

anomaly_map:
  enabled: true
  method: "abs_diff"
  postprocess:
    blur_kernel: 5
    min_max_normalize: true
    morphological_open: false