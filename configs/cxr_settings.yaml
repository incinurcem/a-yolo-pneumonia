  roi_metadata_csv: "/content/drive/MyDrive/Spring Semester/medical image analysis project/outputs/tables/roi_metadata.csv"
  roi_qc_csv: "/content/drive/MyDrive/Spring Semester/medical image analysis project/outputs/tables/roi_qc_features.csv"
  bbox_features_csv: "/content/drive/MyDrive/Spring Semester/medical image analysis project/outputs/tables/bbox_features.csv"
  condition_master_csv: "/content/drive/MyDrive/Spring Semester/medical image analysis project/outputs/tables/condition_features_master.csv"

  plain_ckpt_dir: "/content/drive/MyDrive/Spring Semester/medical image analysis project/outputs/checkpoints/plain"
  cond_ckpt_dir: "/content/drive/MyDrive/Spring Semester/medical image analysis project/outputs/checkpoints/conditional"
  pred_dir: "/content/drive/MyDrive/Spring Semester/medical image analysis project/outputs/predictions"

segmentation:
  image_size: 512
  batch_size: 8
  epochs: 30
  lr: 0.0003
  num_workers: 4
  threshold: 0.5

roi:
  crop_margin: 12
  min_area_ratio: 0.02
  output_size: 384

classification:
  image_size: 384
  batch_size: 16
  epochs: 15
  lr: 0.0001
  num_workers: 4
  num_classes: 2

conditional:
  feature_dim: 16