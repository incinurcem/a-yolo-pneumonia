  test_png_dir: "/content/drive/MyDrive/Spring Semester/medical image analysis project/data/processed_pre/test/images_png"

  merged_metadata_csv: "/content/drive/MyDrive/Spring Semester/medical image analysis project/data/csv/merged_master_with_split.csv"
  qc_features_csv: "/content/drive/MyDrive/Spring Semester/medical image analysis project/data/csv/qc_features.csv"

  seg_train_csv: "/content/drive/MyDrive/Spring Semester/medical image analysis project/data/segmentation/lung_seg_train.csv"
  seg_val_csv: "/content/drive/MyDrive/Spring Semester/medical image analysis project/data/segmentation/lung_seg_val.csv"
  seg_mask_root: "/content/drive/MyDrive/Spring Semester/medical image analysis project/data/segmentation/masks"

  mask_output_dir: "/content/drive/MyDrive/Spring Semester/medical image analysis project/outputs/masks"
